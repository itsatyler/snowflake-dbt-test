version: 2

sources:
  - name: lnd
    database: health_demo
    schema: lnd
    tables:
      - name: raw_adverse_events
      - name: raw_clinical_trials
      - name: raw_drugs
      - name: raw_patients
      - name: raw_physicians
      - name: raw_trial_drug_assignments
      - name: raw_trial_enrollments

models:
  - name: stg_adverse_events
    columns:
      - name: enrollment_id
      - name: event_date
      - name: event_description
      - name: event_id
      - name: patient_id
      - name: reported_by
      - name: resolved_date
      - name: severity
  - name: stg_clinical_trials
    columns:
      - name: end_date
      - name: phase
      - name: sponsor_name
      - name: status
      - name: therapeutic_area
      - name: trail_id
      - name: trail_name
      - name: updated_at
  - name: stg_drugs
    columns:
      - name: drug_id
      - name: approval_status
      - name: drug_class
      - name: drug_name
      - name: generic_name
      - name: manufacturer
      - name: updated_at
  - name: stg_patients
    columns:
      - name: address_state
      - name: created_at
      - name: date_of_birth
      - name: enrollment_status
      - name: first_name
      - name: gender
      - name: insurance_plan_code
      - name: insurance_provider
      - name: last_name
      - name: patient_id
      - name: primary_physician_id
      - name: updated_at 
  - name: stg_physicians
    columns:
      - name: affiliated_hospital
      - name: employment_type
      - name: full_name
      - name: license_state
      - name: npi_number
      - name: physician_id
      - name: specialty
      - name: updated_at
  - name: stg_trial_drug_assignments
    columns:
      - name: arm_label
      - name: assignment_id
      - name: dosage_mg
      - name: drug_id
      - name: frequency
      - name: trial_id
  - name: stg_trial_enrollments
    columns:
      - name: current_status
      - name: enrolled_date
      - name: enrollment_id
      - name: patient_id
      - name: trial_id
      - name: updated_at
      - name: withdrawal_date
      - name: withdrawal_reason