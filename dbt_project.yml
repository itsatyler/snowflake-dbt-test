name: 'warehouse_testing'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  warehouse_testing:
    warehouse:
      +database: warehouse
      
      stg:
        +schema: stg
        +materialized: view
      
      intermediate:
        +schema: intermediate
        +materialized: view
      
      dw:
        +schema: dw
        +materialized: table
      
      data_mart:
        +schema: data_mart
        +materialized: table
    
seeds:
  warehouse_testing:
    warehouse:
      +database: warehouse
      +schema: seed
    
snapshots:
  warehouse_testing:
    warehouse:
      +database: warehouse
